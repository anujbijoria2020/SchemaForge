  #     - ./backend/src:/app/src
  #   # Inject all required backend environment variables
  #   environment:
  #     - PORT=${PORT}
  #     - NODE_ENV=${NODE_ENV}
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - JWT_SECRET=${JWT_SECRET}
  #     - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
  #     - FRONTEND_URL=${FRONTEND_URL}
  #     - BCRYPT_ROUNDS=${BCRYPT_ROUNDS}
  #   # Wait for both postgres and redis to be fully healthy before starting the API
